# CARDEX Prometheus Configuration
# Addresses Gap G-06: No monitoring/alerting stack defined

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Gateway (Phase 3)
  - job_name: 'cardex-gateway'
    static_configs:
      - targets: ['gateway:9091']
    metrics_path: /metrics

  # Pipeline (Phase 4)
  - job_name: 'cardex-pipeline'
    static_configs:
      - targets: ['pipeline:9091']

  # Forensics (Phase 5)
  - job_name: 'cardex-forensics'
    static_configs:
      - targets: ['forensics:9091']

  # Alpha Engine (Phase 6)
  - job_name: 'cardex-alpha'
    static_configs:
      - targets: ['alpha:9091']

  # Legal Hub (Phase 7)
  - job_name: 'cardex-legal'
    static_configs:
      - targets: ['legal:9091']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['pg-exporter:9187']

  # ClickHouse
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']

  # Node exporters (bare-metal health)
  - job_name: 'node'
    static_configs:
      - targets:
        - 'nodo01:9100'
        - 'nodo02:9100'
        - 'nodo03:9100'
