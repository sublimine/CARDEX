# CARDEX Nginx Reverse Proxy
# Terminates TLS, routes to Next.js (web), Go API, and MeiliSearch.
# In production: replace server_name and certificate paths.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript;

    # Security headers (applied to all responses)
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_global:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_search:10m rate=120r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;

    # Upstream services
    upstream cardex_api {
        server api:8080;
        keepalive 32;
    }
    upstream cardex_web {
        server web:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
    server {
        listen 80;
        server_name cardex.eu www.cardex.eu _;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # ── Main HTTPS server ──────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name cardex.eu www.cardex.eu;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        client_max_body_size 10m;

        # ── REST API ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_global burst=20 nodelay;

            proxy_pass         http://cardex_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout  30s;
            proxy_send_timeout  30s;
            proxy_connect_timeout 5s;

            # Tighter rate limit for auth endpoints
            location /api/v1/auth/ {
                limit_req zone=api_auth burst=3 nodelay;
                proxy_pass http://cardex_api;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Slightly more generous limit for search
            location /api/v1/marketplace/search {
                limit_req zone=api_search burst=30 nodelay;
                proxy_pass http://cardex_api;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_valid 200 10s;
            }
        }

        # ── Health endpoint (no rate limit, no auth) ────────────────────────
        location /healthz {
            proxy_pass http://cardex_api/healthz;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Next.js Web App ─────────────────────────────────────────────────
        location / {
            proxy_pass         http://cardex_web;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Static Next.js assets (long cache) ─────────────────────────────
        location /_next/static/ {
            proxy_pass http://cardex_web;
            proxy_set_header Host $host;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Robots / security ───────────────────────────────────────────────
        location /robots.txt {
            return 200 "User-agent: *\nAllow: /\nDisallow: /api/\nDisallow: /dashboard/\nSitemap: https://cardex.eu/sitemap.xml\n";
            add_header Content-Type text/plain;
        }
    }

    # ── Internal: Grafana (accessible only from VPN/internal) ─────────────
    # Uncomment and add IP restriction if Grafana is exposed:
    # server {
    #     listen 3000;
    #     location / {
    #         allow 10.0.0.0/8;
    #         deny all;
    #         proxy_pass http://grafana:3000;
    #     }
    # }
}
