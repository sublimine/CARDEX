# prometheus.yml — CARDEX Prometheus scrape configuration
# Retention: 30 days (passed via --storage.tsdb.retention.time=30d in docker-compose)
# Scrape interval: 30s globally; overridden per job where needed

global:
  scrape_interval:     30s
  evaluation_interval: 30s
  scrape_timeout:      10s
  external_labels:
    env: production
    project: cardex

# Alertmanager integration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alerting rules
rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:

  # ── Prometheus self-scrape ────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ── CARDEX Discovery ──────────────────────────────────────────────
  - job_name: cardex_discovery
    metrics_path: /metrics
    static_configs:
      - targets:
          - discovery:9101     # Docker Compose service name
        labels:
          service: discovery
    # For bare-metal systemd deploy, use:
    # - targets: ['127.0.0.1:9101']

  # ── CARDEX Extraction ─────────────────────────────────────────────
  - job_name: cardex_extraction
    metrics_path: /metrics
    static_configs:
      - targets:
          - extraction:9102
        labels:
          service: extraction

  # ── CARDEX Quality ────────────────────────────────────────────────
  - job_name: cardex_quality
    metrics_path: /metrics
    static_configs:
      - targets:
          - quality:9103
        labels:
          service: quality

  # ── Caddy ─────────────────────────────────────────────────────────
  # Requires Caddy admin API: caddy adapt --config /etc/caddy/Caddyfile
  # Caddy exposes /metrics if compiled with prometheus plugin (caddy:2.9+ includes it)
  - job_name: caddy
    metrics_path: /metrics
    static_configs:
      - targets:
          - caddy:2019         # Caddy admin API default port
        labels:
          service: caddy

  # ── Node exporter (VPS host metrics) ────────────────────────────
  # Install: apt install prometheus-node-exporter
  # Or Docker: prom/node-exporter:latest (add to docker-compose if preferred)
  - job_name: node_exporter
    static_configs:
      - targets:
          - host.docker.internal:9100   # Docker Desktop (Mac/Windows dev)
          # - 127.0.0.1:9100            # Bare-metal systemd
        labels:
          service: node

  # ── Alertmanager ─────────────────────────────────────────────────
  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
        labels:
          service: alertmanager
