# nginx.conf — alternative to Caddy for CARDEX reverse proxy
# Use this if Caddy cannot be installed (e.g. restricted environments).
# For production with auto TLS, CADDY IS RECOMMENDED over nginx (no certbot required).
#
# With nginx, TLS cert management requires separate certbot setup:
#   certbot --nginx -d cardex.io -d www.cardex.io
#
# Install: apt install nginx certbot python3-certbot-nginx

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # ── Upstream: CARDEX services ────────────────────────────────────
    upstream discovery_backend {
        server 127.0.0.1:8080;   # discovery service (or Docker: discovery:8080)
        keepalive 10;
    }

    upstream extraction_backend {
        server 127.0.0.1:8081;   # extraction service
        keepalive 10;
    }

    upstream quality_backend {
        server 127.0.0.1:8082;   # quality service
        keepalive 10;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name cardex.io www.cardex.io;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name cardex.io www.cardex.io;

        # TLS (managed by certbot; paths updated automatically after cert issuance)
        ssl_certificate     /etc/letsencrypt/live/cardex.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cardex.io/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:MozSSL:10m;
        ssl_session_tickets off;

        # TLS 1.3 only (Mozilla modern profile)
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;

        # HSTS (1 year, includeSubDomains, preload — matches Caddy) (#37)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP: backend API — no scripts/styles served directly (#36)
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

        # ── Health check ─────────────────────────────────────────────
        location = /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── API: Discovery ───────────────────────────────────────────
        location /api/discovery/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://discovery_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # ── API: Extraction ──────────────────────────────────────────
        location /api/extraction/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://extraction_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        # ── API: Quality ─────────────────────────────────────────────
        location /api/quality/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://quality_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # ── Metrics: loopback only ────────────────────────────────────
        location /metrics {
            allow 127.0.0.1;
            deny all;
            proxy_pass http://127.0.0.1:9090;
        }

        # ── Default 404 ───────────────────────────────────────────────
        location / {
            return 404;
        }
    }
}
