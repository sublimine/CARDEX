<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CARDEX Intelligence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      background: #0f1117;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }
    .header {
      background: linear-gradient(135deg, #1a1b2e 0%, #1e1f35 100%);
      padding: 16px;
      border-bottom: 1px solid #2d2f3e;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0.06em;
      color: #7c3aed;
    }
    .logo-sub {
      font-size: 10px;
      color: #6b7280;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .body { padding: 16px; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #1a1b2e;
      border-radius: 8px;
      border: 1px solid #2d2f3e;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      flex-shrink: 0;
    }
    .status-dot.inactive { background: #6b7280; }
    .status-text { font-size: 12px; color: #9ca3af; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
    }
    .toggle-label { color: #d1d5db; font-size: 13px; }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #374151;
      border-radius: 99px;
      transition: 0.2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    input:checked + .slider { background: #7c3aed; }
    input:checked + .slider:before { transform: translateX(18px); }
    .divider { height: 1px; background: #2d2f3e; margin: 12px 0; }
    .sites-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .sites-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }
    .site-badge {
      background: #1a1b2e;
      border: 1px solid #2d2f3e;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 10px;
      color: #9ca3af;
      text-align: center;
    }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #2d2f3e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .btn-settings {
      background: none;
      border: 1px solid #374151;
      color: #9ca3af;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .btn-settings:hover {
      border-color: #7c3aed;
      color: #a78bfa;
    }
    .version { font-size: 10px; color: #4b5563; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="logo">⬡ CARDEX</div>
      <div class="logo-sub">Intelligence Extension</div>
    </div>
  </div>

  <div class="body">
    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <div class="status-text" id="status-text">Conectando a CARDEX API…</div>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Overlay activo</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-enabled" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="divider"></div>

    <div class="sites-title">Portales detectados</div>
    <div class="sites-grid">
      <div class="site-badge">AutoScout24</div>
      <div class="site-badge">mobile.de</div>
      <div class="site-badge">Wallapop</div>
      <div class="site-badge">LeBonCoin</div>
      <div class="site-badge">Coches.net</div>
      <div class="site-badge">Marktplaats</div>
      <div class="site-badge">La Centrale</div>
      <div class="site-badge">Milanuncios</div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-settings" id="btn-settings">⚙ Configurar</button>
    <span class="version">v1.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
